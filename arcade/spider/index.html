<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Spider Solitaire — Sara Gottlieb</title>
  <link rel="stylesheet" href="../arcade.css" />
  <link rel="stylesheet" href="spider.css" />
</head>
<body>
  <div id="game" class="arcade-game">
    <header id="controls">
      <button id="new-game-btn" class="arcade-btn">New Game</button>
      <div id="suit-toggle" class="arcade-toggle">
        <button id="suit1-btn" class="active">1 Suit</button>
        <button id="suit2-btn">2 Suits</button>
        <button id="suit4-btn">4 Suits</button>
      </div>
      <span id="move-counter">Moves: 0</span>
      <span id="score-counter">Score: 500</span>
    </header>
    <div id="table">
      <div id="tableau">
        <div id="tableau-0" class="pile column"></div>
        <div id="tableau-1" class="pile column"></div>
        <div id="tableau-2" class="pile column"></div>
        <div id="tableau-3" class="pile column"></div>
        <div id="tableau-4" class="pile column"></div>
        <div id="tableau-5" class="pile column"></div>
        <div id="tableau-6" class="pile column"></div>
        <div id="tableau-7" class="pile column"></div>
        <div id="tableau-8" class="pile column"></div>
        <div id="tableau-9" class="pile column"></div>
      </div>
      <div id="bottom-row">
        <div id="stock" class="pile"></div>
        <div id="stock-count"></div>
        <div class="spacer"></div>
        <div id="completed-count"></div>
        <div id="completed" class="pile"></div>
      </div>
    </div>
    <div id="win-overlay" class="hidden">
      <canvas id="win-canvas"></canvas>
      <div id="win-message">
        <h1>You Won!</h1>
        <p id="win-score"></p>
        <button id="play-again-btn" class="arcade-btn">Play Again</button>
      </div>
    </div>
  </div>
  <script type="module" src="spider.js"></script>
</body>
</html>
