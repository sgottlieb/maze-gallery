<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcade — Sara Gottlieb</title>
  <link rel="stylesheet" href="arcade.css" />
  <style>
    body {
      overflow: auto;
      touch-action: auto;
      user-select: auto;
    }

    .arcade-landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .arcade-landing h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      font-weight: 400;
      color: #3A352F;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .arcade-landing .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: #6B5F52;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 500px;
      padding: 0 16px;
    }

    .game-tile {
      background: transparent;
      border: 1px solid #E0D8CC;
      border-radius: 12px;
      padding: 36px 20px 28px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .game-tile:hover {
      border-color: #C4B5A0;
      background: rgba(245, 240, 232, 0.5);
    }

    .game-tile .icon {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      color: #3A352F;
      margin-bottom: 14px;
    }

    .game-tile .name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: #3A352F;
    }

    .game-tile .desc {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.8rem;
      font-style: italic;
      color: #A09888;
      margin-top: 6px;
    }

    @media (max-width: 500px) {
      .game-tile {
        padding: 24px 12px 18px;
      }
      .game-tile .icon { font-size: 24px; margin-bottom: 10px; }
      .game-tile .name { font-size: 0.95rem; }
      .game-tile .desc { font-size: 0.7rem; }
    }

  </style>
</head>
<body>
  <div class="arcade-landing">
    <h1>Arcade</h1>
    <p class="subtitle">Pick a game to play</p>
    <div class="game-grid">
      <a href="solitaire/" class="game-tile">
        <div class="icon">&spades;</div>
        <div class="name">Solitaire</div>
        <div class="desc">Classic solitaire</div>
      </a>
      <a href="spider/" class="game-tile">
        <div class="icon">🕷️</div>
        <div class="name">Spider</div>
        <div class="desc">Spider solitaire</div>
      </a>
      <a href="oracle/" class="game-tile">
        <div class="icon">&#10023;</div>
        <div class="name">Oracle</div>
        <div class="desc">Card readings</div>
      </a>
    </div>
  </div>
</body>
</html>
