<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Retro texture generator · 3D Maze</title>
<style>
  body { background: #1a1028; color: #fff; font-family: system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 18px; margin: 0 0 6px; letter-spacing: 0.5px; }
  p { color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.5; margin: 0 0 18px; max-width: 640px; }
  code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
  .patterns { display: flex; flex-wrap: wrap; gap: 16px; margin: 20px 0 24px; }
  .pattern { text-align: center; }
  .pattern canvas { display: block; width: 220px; height: 220px; image-rendering: pixelated; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; }
  .pattern .label { margin: 8px 0 0; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  button {
    background: #b89ad8; color: #1a1028; border: 0;
    padding: 10px 20px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; font-weight: 600;
  }
  button:hover { background: #c9afe4; }
</style>
</head>
<body>

<h1>Retro texture generator</h1>
<p>
  Four procedurally-generated patterns inspired by the Windows 3D Maze screensaver.
  Click <strong>Download all</strong> to save them as PNGs, then move them into
  <code>art/retro/</code>. Then tell Claude you have them — it'll wire them into the catalog.
</p>

<div class="patterns" id="patterns"></div>

<button id="dl">Download all</button>

<script>
const W = 512, H = 512;

const PATTERNS = [
  { name: 'Brick', fn: renderBrick },
  { name: 'Sky', fn: renderSky },
  { name: 'Checker', fn: renderChecker },
  { name: 'Stars', fn: renderStars },
  { name: 'Dollz', fn: renderDollz },
];

function renderBrick(ctx, w, h) {
  // mortar background — soft baby pink
  ctx.fillStyle = '#ffd4e0';
  ctx.fillRect(0, 0, w, h);
  const bh = 42, bw = 110, gap = 4;
  let rowIdx = 0;
  for (let y = -gap; y < h + bh; y += bh + gap, rowIdx++) {
    const offset = rowIdx % 2 === 0 ? 0 : -bw / 2;
    for (let x = offset; x < w; x += bw + gap) {
      // bubblegum to hot-pink variation
      const v = (Math.sin((x * 0.13 + y * 0.27 + rowIdx * 1.1)) * 0.5 + 0.5);
      const r = Math.floor(235 + v * 20);      // stays in pink range 235-255
      const g = Math.floor(95 + v * 75);       // 95-170 — rose→salmon
      const b = Math.floor(160 + v * 50);      // 160-210 — always pink-leaning
      ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
      ctx.fillRect(x, y, bw, bh);
      // top highlight — pearl shimmer
      ctx.fillStyle = 'rgba(255, 240, 250, 0.35)';
      ctx.fillRect(x, y, bw, 3);
      // bottom shadow — muted rose
      ctx.fillStyle = 'rgba(120, 40, 80, 0.2)';
      ctx.fillRect(x, y + bh - 3, bw, 3);
      // left edge shadow
      ctx.fillStyle = 'rgba(120, 40, 80, 0.12)';
      ctx.fillRect(x, y, 2, bh);
    }
  }
}

function renderSky(ctx, w, h) {
  // Y2K sunset: hot pink → peach → lavender
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#ff5fa8');
  grad.addColorStop(0.45, '#ffa5c4');
  grad.addColorStop(0.75, '#e0b8e0');
  grad.addColorStop(1, '#c4a5e0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // puffy cotton-candy clouds
  const clouds = [
    { x: 90, y: 120, r: 42 },
    { x: 270, y: 170, r: 62 },
    { x: 420, y: 90, r: 38 },
    { x: 160, y: 320, r: 48 },
    { x: 400, y: 380, r: 55 },
    { x: 80, y: 430, r: 34 },
  ];
  for (const c of clouds) {
    // lilac shadow underneath
    ctx.fillStyle = 'rgba(180, 120, 170, 0.15)';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.45, c.y + Math.abs(i) * 3 + 4, c.r * (1 - Math.abs(i) * 0.15), 0, Math.PI * 2);
      ctx.fill();
    }
    // pearlescent white-pink body
    ctx.fillStyle = 'rgba(255, 240, 248, 0.97)';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.45, c.y + Math.abs(i) * 3, c.r * (1 - Math.abs(i) * 0.15), 0, Math.PI * 2);
      ctx.fill();
    }
    // bright pink-white highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.4 - 4, c.y - c.r * 0.2, c.r * (1 - Math.abs(i) * 0.2) * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // scatter a few sparkle stars across the sky (Y2K detail)
  let seed = 7;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 0x100000000; };
  for (let i = 0; i < 12; i++) {
    const x = rand() * w, y = rand() * h * 0.6;
    ctx.fillStyle = `rgba(255, 255, 255, ${0.6 + rand() * 0.4})`;
    ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + rand() * 0.3})`;
    ctx.fillRect(x - 2, y + 0.5, 6, 1);
    ctx.fillRect(x + 0.5, y - 2, 1, 6);
  }
}

function renderChecker(ctx, w, h) {
  // Y2K hot pink + black checker — skater / Avril Lavigne energy
  const size = 64;
  for (let y = 0; y < h; y += size) {
    for (let x = 0; x < w; x += size) {
      const isLight = (Math.floor(x / size) + Math.floor(y / size)) % 2 === 0;
      ctx.fillStyle = isLight ? '#ff5fa8' : '#1a0820';
      ctx.fillRect(x, y, size, size);
    }
  }
  // very subtle grain + shimmer
  for (let i = 0; i < 2000; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
    ctx.fillRect(x, y, 1, 1);
  }
}

function renderStars(ctx, w, h) {
  // Y2K holographic galaxy — deep magenta → plum → near-black
  const grad = ctx.createRadialGradient(w * 0.6, h * 0.4, 0, w / 2, h / 2, Math.max(w, h) / 1.1);
  grad.addColorStop(0, '#6b1a5a');
  grad.addColorStop(0.5, '#2a0a35');
  grad.addColorStop(1, '#0a0214');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // deterministic pseudo-random stars
  let seed = 42;
  const rand = () => {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 0x100000000;
  };
  // pink/white/lavender star palette for Y2K holographic feel
  const starColors = [
    [255, 255, 255],  // white
    [255, 180, 220],  // baby pink
    [255, 100, 180],  // hot pink
    [210, 180, 255],  // lavender
  ];
  for (let i = 0; i < 280; i++) {
    const x = Math.floor(rand() * w);
    const y = Math.floor(rand() * h);
    const roll = rand();
    const size = roll < 0.78 ? 1 : roll < 0.94 ? 2 : 3;
    const alpha = 0.5 + rand() * 0.5;
    const color = starColors[Math.floor(rand() * starColors.length)];
    ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    ctx.fillRect(x, y, size, size);
    if (size === 3) {
      // sparkle cross-arms
      ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha * 0.55})`;
      ctx.fillRect(x - 3, y + 1, size + 6, 1);
      ctx.fillRect(x + 1, y - 3, 1, size + 6);
    }
  }
  // holographic nebula smudges — soft pink and lavender clouds
  const nebulaColors = [
    'rgba(255, 120, 200, ',
    'rgba(200, 150, 255, ',
  ];
  for (let i = 0; i < 4; i++) {
    const cx = Math.floor(rand() * w);
    const cy = Math.floor(rand() * h);
    const baseColor = nebulaColors[i % nebulaColors.length];
    for (let j = 0; j < 60; j++) {
      const r = rand() * 32;
      const a = rand() * Math.PI * 2;
      ctx.fillStyle = baseColor + ((1 - r / 32) * 0.3).toFixed(3) + ')';
      ctx.fillRect(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1, 1);
    }
  }
}

function renderDollz(ctx, w, h) {
  // Pink cotton-candy backdrop
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#ffd4ea');
  grad.addColorStop(1, '#ffa8cc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  let seed = 321;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 0x100000000; };

  // Background: scattered hearts + sparkles + stars
  for (let i = 0; i < 45; i++) {
    const x = rand() * w, y = rand() * h;
    const alpha = 0.2 + rand() * 0.3;
    const kind = rand();
    if (kind < 0.5) {
      ctx.fillStyle = `rgba(255, 100, 170, ${alpha})`;
      drawHeart(ctx, x, y, 3 + rand() * 3);
    } else if (kind < 0.85) {
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fillRect(x, y, 2, 2);
      ctx.fillRect(x - 3, y + 1, 8, 1);
      ctx.fillRect(x + 1, y - 3, 1, 8);
    } else {
      ctx.fillStyle = `rgba(255, 200, 230, ${alpha * 1.3})`;
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Dollz palettes — saturated Y2K
  const HAIR = [
    { base: '#ffd93d', hi: '#fff6a8' },  // blonde
    { base: '#5a3820', hi: '#8b5a35' },  // brown
    { base: '#1a1020', hi: '#443850' },  // black
    { base: '#ff4a9d', hi: '#ff9dc4' },  // hot pink
    { base: '#7a3dcc', hi: '#b388e8' },  // purple
    { base: '#ff7744', hi: '#ffb088' },  // orange/red
    { base: '#33aaff', hi: '#88ccff' },  // blue
    { base: '#d8d8e8', hi: '#ffffff' },  // silver/white
    { base: '#33cc99', hi: '#88e8c4' },  // mint
  ];
  const SKIN = [
    { base: '#ffe0c4', shade: '#e8b897' },
    { base: '#f5cfa8', shade: '#d4a573' },
    { base: '#d4a573', shade: '#a8785a' },
    { base: '#a8785a', shade: '#6b4a30' },
    { base: '#6b4a30', shade: '#443020' },
  ];
  const OUTFIT = [
    { top: '#ff4a9d', bottom: '#1a1020' }, // hot pink top, black skirt
    { top: '#88ddff', bottom: '#ff4a9d' }, // blue top, pink skirt
    { top: '#ffffff', bottom: '#7a3dcc' }, // white top, purple skirt
    { top: '#ffd93d', bottom: '#33cc99' }, // yellow + mint
    { top: '#ff7744', bottom: '#1a1020' }, // orange + black
    { top: '#9966cc', bottom: '#ffd93d' }, // lavender + yellow
    { top: '#ff9dc4', bottom: '#ffffff' }, // pink + white
    { top: '#88dd88', bottom: '#ff4a9d' }, // mint + pink
  ];
  const EYE_COLORS = ['#3a8cc4', '#4a7a3a', '#7a4a8a', '#5a3020', '#3a6a8a', '#8a4a3a'];
  const HAIR_STYLES = ['long', 'bob', 'pigtails', 'pony', 'curly', 'space-buns'];
  const POSES = ['stand', 'hip'];
  const ACCESSORIES = [null, null, 'choker', 'bow', 'star-earring', 'heart-cheek'];

  // 4 columns × 2 rows = 8 bigger dolls
  const COLS = 4, ROWS = 2;
  const TOP_PAD = 60;
  const BOTTOM_PAD = 20;
  const TILE_W = w / COLS;
  const TILE_H = (h - TOP_PAD - BOTTOM_PAD) / ROWS;

  // Each doll: 30×55 grid at 3x pixel scale = 90×165 real px
  const DOLL_W = 30 * 3;
  const DOLL_H = 55 * 3;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const tileX = col * TILE_W;
      const tileY = TOP_PAD + row * TILE_H;
      const dollOX = tileX + (TILE_W - DOLL_W) / 2;
      const dollOY = tileY + (TILE_H - DOLL_H) / 2;

      const hair = HAIR[Math.floor(rand() * HAIR.length)];
      const skin = SKIN[Math.floor(rand() * SKIN.length)];
      const outfit = OUTFIT[Math.floor(rand() * OUTFIT.length)];
      const eyeColor = EYE_COLORS[Math.floor(rand() * EYE_COLORS.length)];
      const style = HAIR_STYLES[Math.floor(rand() * HAIR_STYLES.length)];
      const pose = POSES[Math.floor(rand() * POSES.length)];
      const accessory = ACCESSORIES[Math.floor(rand() * ACCESSORIES.length)];

      // tiny stage/shadow ellipse under feet
      ctx.fillStyle = 'rgba(120, 50, 90, 0.2)';
      ctx.beginPath();
      ctx.ellipse(dollOX + DOLL_W / 2, dollOY + DOLL_H + 4, DOLL_W * 0.35, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      drawDoll(ctx, dollOX, dollOY, { hair, skin, outfit, eyeColor, style, pose, accessory });

      // occasional floating heart next to doll
      if (rand() < 0.35) {
        ctx.fillStyle = 'rgba(255, 70, 140, 0.85)';
        drawHeart(ctx, tileX + 14 + rand() * 12, dollOY + 20 + rand() * 40, 5);
      }
    }
  }

  // Title bar
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.fillRect(0, 4, w, 46);
  ctx.strokeStyle = 'rgba(255, 70, 140, 0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 5, w - 2, 44);
  drawPixelText(ctx, '~* dollZ *~', w / 2, 26, '#c43090', 4);
}

function drawHeart(ctx, x, y, size) {
  const s = Math.max(1, Math.round(size / 3));
  ctx.fillRect(x - s * 2, y - s, s * 2, s);
  ctx.fillRect(x,       y - s, s * 2, s);
  ctx.fillRect(x - s * 3, y, s * 6, s);
  ctx.fillRect(x - s * 2, y + s, s * 4, s);
  ctx.fillRect(x - s,     y + s * 2, s * 2, s);
}

function drawDoll(ctx, ox, oy, params) {
  // 30×55 grid at 3x pixel scale. Chibi-proportioned dollz-style figure.
  // Grid layout:
  //   rows 0-2   hair crown (above head)
  //   rows 3-22  head (20 rows tall, ~18 cols wide)
  //     rows 10-16  eye area (rows 11-15 = eyes proper, big anime style)
  //     row 19       nose dot
  //     row 21       mouth
  //   rows 23-24  neck
  //   rows 25-33  torso (tube top + bare midriff + skirt top)
  //   rows 34-42  skirt
  //   rows 43-50  legs
  //   rows 51-54  platform shoes
  const { hair, skin, outfit, eyeColor, style, pose, accessory } = params;
  const PX = 3;

  const rect = (col, row, cols, rows, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(ox + col * PX, oy + row * PX, cols * PX, rows * PX);
  };
  const px = (col, row, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(ox + col * PX, oy + row * PX, PX, PX);
  };

  const OUTLINE = '#1a1020';
  const LIP = '#c43060';
  const BLUSH = 'rgba(255, 130, 180, 0.55)';
  const WHITE = '#ffffff';

  // ============================================================
  // HAIR BACK LAYER — fills behind head, varies by style
  // ============================================================
  if (style === 'long') {
    // long flowing past shoulders, widening near ends
    rect(5, 3, 20, 28, hair.base);
    // highlight streak
    rect(12, 5, 2, 22, hair.hi);
    // tapered ends
    px(4, 25, hair.base); px(25, 25, hair.base);
    rect(4, 26, 2, 4, hair.base);
    rect(24, 26, 2, 4, hair.base);
  } else if (style === 'bob') {
    rect(5, 3, 20, 18, hair.base);
    rect(12, 5, 2, 13, hair.hi);
  } else if (style === 'pigtails') {
    rect(5, 3, 20, 14, hair.base);
    // pigtails drop down each side
    rect(2, 10, 5, 18, hair.base);
    rect(23, 10, 5, 18, hair.base);
    // ties at top of pigtails
    rect(2, 11, 5, 1, '#ff4a9d');
    rect(23, 11, 5, 1, '#ff4a9d');
    // highlights on pigtails
    rect(3, 13, 1, 13, hair.hi);
    rect(26, 13, 1, 13, hair.hi);
  } else if (style === 'pony') {
    rect(5, 3, 20, 14, hair.base);
    // ponytail swept to the right
    rect(22, 10, 6, 16, hair.base);
    rect(25, 14, 2, 10, hair.hi);
  } else if (style === 'curly') {
    // voluminous curly frame
    rect(3, 3, 24, 19, hair.base);
    // curl bumps on outline
    for (let i = 0; i < 8; i++) {
      const cx = 3 + i * 3;
      rect(cx, 2, 2, 2, hair.base);
    }
    // highlights throughout
    rect(8, 5, 2, 3, hair.hi);
    rect(19, 6, 2, 4, hair.hi);
    rect(13, 8, 2, 4, hair.hi);
  } else if (style === 'space-buns') {
    rect(5, 4, 20, 15, hair.base);
    // two buns on top
    rect(4, 0, 8, 7, hair.base);
    rect(18, 0, 8, 7, hair.base);
    // bun rings
    rect(5, 1, 6, 5, hair.hi);
    rect(19, 1, 6, 5, hair.hi);
    px(8, 3, hair.base);
    px(22, 3, hair.base);
  }

  // ============================================================
  // HEAD — 18 cols × 20 rows, rounded corners
  // ============================================================
  // Main skin fill
  rect(6, 3, 18, 20, skin.base);
  // Round the top corners
  rect(6, 3, 2, 1, 'rgba(0,0,0,0)');
  rect(22, 3, 2, 1, 'rgba(0,0,0,0)');
  px(6, 4, 'rgba(0,0,0,0)');
  px(23, 4, 'rgba(0,0,0,0)');
  // Round the bottom corners (chin taper)
  rect(6, 22, 3, 1, 'rgba(0,0,0,0)');
  rect(21, 22, 3, 1, 'rgba(0,0,0,0)');
  px(7, 21, 'rgba(0,0,0,0)');
  px(22, 21, 'rgba(0,0,0,0)');
  // Cover removed pixels with background bleedthrough is not needed since
  // we set rgba(0,0,0,0) — that doesn't erase, it's transparent fill.
  // We actually need to NOT draw those pixels. Let's redo head with a mask.
  // Simpler: draw head as a rounded rect fill using arcs.
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox + 8 * PX, oy + 3 * PX);
  ctx.lineTo(ox + 22 * PX, oy + 3 * PX);
  ctx.quadraticCurveTo(ox + 24 * PX, oy + 3 * PX, ox + 24 * PX, oy + 6 * PX);
  ctx.lineTo(ox + 24 * PX, oy + 20 * PX);
  ctx.quadraticCurveTo(ox + 24 * PX, oy + 23 * PX, ox + 21 * PX, oy + 23 * PX);
  ctx.lineTo(ox + 9 * PX, oy + 23 * PX);
  ctx.quadraticCurveTo(ox + 6 * PX, oy + 23 * PX, ox + 6 * PX, oy + 20 * PX);
  ctx.lineTo(ox + 6 * PX, oy + 6 * PX);
  ctx.quadraticCurveTo(ox + 6 * PX, oy + 3 * PX, ox + 8 * PX, oy + 3 * PX);
  ctx.closePath();
  ctx.clip();
  // Clear (redraw bg won't work, so fill with background-matching tone — nope.
  // Instead: just draw full head and rely on clip to shape it.
  ctx.fillStyle = skin.base;
  ctx.fillRect(ox, oy, 30 * PX, 25 * PX);
  // subtle shading on one side of face
  ctx.fillStyle = skin.shade;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(ox + 18 * PX, oy + 8 * PX, 6 * PX, 14 * PX);
  ctx.globalAlpha = 1;
  ctx.restore();

  // ============================================================
  // HAIR FRONT (bangs/fringe) — drawn over forehead
  // ============================================================
  if (style === 'long' || style === 'bob' || style === 'pigtails' || style === 'pony' || style === 'space-buns') {
    // side-swept bangs
    rect(6, 3, 18, 3, hair.base);
    px(6, 6, hair.base);
    px(7, 6, hair.base);
    px(22, 6, hair.base);
    px(23, 6, hair.base);
    // bang highlight
    rect(11, 4, 2, 2, hair.hi);
  } else if (style === 'curly') {
    rect(6, 3, 18, 4, hair.base);
    rect(10, 5, 3, 2, hair.hi);
  }

  // ============================================================
  // EYES — big dollz-style with iris, pupil, highlight, lashes
  // Each eye: 5 cols × 6 rows at positions (9,11) and (16,11)
  // ============================================================
  // Upper lashes extending up (outer corners)
  px(8, 10, OUTLINE);
  px(9, 10, OUTLINE);
  px(16, 10, OUTLINE);
  px(17, 10, OUTLINE);
  // left eye
  drawEye(ctx, ox + 9 * PX, oy + 11 * PX, PX, eyeColor);
  // right eye
  drawEye(ctx, ox + 16 * PX, oy + 11 * PX, PX, eyeColor);

  // ============================================================
  // BLUSH
  // ============================================================
  ctx.fillStyle = BLUSH;
  ctx.fillRect(ox + 7 * PX, oy + 17 * PX, 3 * PX, 2 * PX);
  ctx.fillRect(ox + 20 * PX, oy + 17 * PX, 3 * PX, 2 * PX);

  // ============================================================
  // NOSE (tiny) + MOUTH
  // ============================================================
  px(14, 17, skin.shade);
  px(15, 17, skin.shade);
  // mouth
  rect(13, 20, 4, 1, LIP);
  px(13, 21, LIP);
  px(16, 21, LIP);

  // Accessory: heart on cheek
  if (accessory === 'heart-cheek') {
    ctx.fillStyle = '#ff4a9d';
    drawHeart(ctx, ox + 21 * PX, oy + 17 * PX, 4);
  }

  // Accessory: bow in hair
  if (accessory === 'bow') {
    const bowCol = '#ff4a9d';
    rect(11, 1, 2, 2, bowCol);
    rect(17, 1, 2, 2, bowCol);
    rect(13, 1, 4, 2, bowCol);
    px(15, 1, WHITE);
  }

  // Star earring (tiny yellow star by ear)
  if (accessory === 'star-earring') {
    ctx.fillStyle = '#ffd93d';
    ctx.fillRect(ox + 5 * PX, oy + 14 * PX, PX, PX);
    ctx.fillRect(ox + 4 * PX, oy + 15 * PX, 3 * PX, PX);
    ctx.fillRect(ox + 5 * PX, oy + 16 * PX, PX, PX);
  }

  // ============================================================
  // NECK
  // ============================================================
  rect(13, 23, 4, 2, skin.base);

  // Choker
  if (accessory === 'choker') {
    rect(13, 24, 4, 1, '#1a1020');
    px(14, 24, '#ff4a9d');
  }

  // ============================================================
  // TORSO — tube top + bare midriff + skirt waistband
  // ============================================================
  // Shoulders/chest — tube top (rows 25-28)
  rect(10, 25, 10, 4, outfit.top);
  // top highlight streak
  rect(11, 25, 2, 3, 'rgba(255,255,255,0.3)');
  // bare midriff (rows 29-31)
  rect(11, 29, 8, 3, skin.base);
  // navel (tiny)
  px(15, 30, skin.shade);
  // skirt waistband (rows 32-33)
  rect(10, 32, 10, 2, outfit.bottom);
  // belt highlight
  px(15, 32, '#ffd93d');

  // ============================================================
  // ARMS (skin, thin)
  // Pose: 'stand' = both arms straight. 'hip' = right arm bent on hip.
  // ============================================================
  // Left arm (always straight down)
  rect(8, 25, 2, 11, skin.base);
  if (pose === 'hip') {
    // Right arm bends up and sits on hip — upper arm out, forearm down to waist
    rect(20, 25, 2, 4, skin.base);          // upper arm from shoulder
    rect(20, 28, 4, 2, skin.base);          // elbow out to side
    rect(22, 28, 2, 5, skin.base);          // forearm down to hip
  } else {
    rect(20, 25, 2, 11, skin.base);
  }

  // ============================================================
  // SKIRT (mini, flares slightly)
  // ============================================================
  for (let r = 0; r < 8; r++) {
    const extra = Math.floor(r * 0.6);
    const startCol = 10 - extra;
    const width = 10 + extra * 2;
    rect(startCol, 34 + r, width, 1, outfit.bottom);
  }
  // skirt shine
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(ox + 12 * PX, oy + 35 * PX, PX, 6 * PX);

  // ============================================================
  // LEGS (thin, skin color)
  // ============================================================
  rect(12, 42, 2, 9, skin.base);
  rect(16, 42, 2, 9, skin.base);

  // ============================================================
  // PLATFORM SHOES (chunky)
  // ============================================================
  const shoe = '#1a1020';
  rect(11, 51, 4, 3, shoe);
  rect(15, 51, 4, 3, shoe);
  // platform soles (lighter, lifted)
  rect(11, 52, 4, 2, '#443340');
  rect(15, 52, 4, 2, '#443340');
}

function drawEye(ctx, x, y, PX, eyeColor) {
  // Each eye is 5 cols × 5 rows. Anime dollz style.
  //   ----- row 0: top outline (eyelash)
  //   wWwwO row 1: white-iris-iris-iris-outline
  //   wIIIO row 2: white-iris-iris-iris-outline
  //   wIIIO row 3: same
  //   -EEE- row 4: bottom outline
  const OUT = '#1a1020';
  const WHITE = '#ffffff';
  const HIGH = '#ffffff';
  const r = (col, row, cols, rows, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * PX, y + row * PX, cols * PX, rows * PX);
  };
  const p = (col, row, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * PX, y + row * PX, PX, PX);
  };
  // Top eyelash (thicker)
  r(0, 0, 5, 1, OUT);
  // Side outlines
  p(0, 1, OUT); p(4, 1, OUT);
  p(0, 2, OUT); p(4, 2, OUT);
  p(0, 3, OUT); p(4, 3, OUT);
  // Bottom
  r(1, 4, 3, 1, OUT);
  // White of eye
  p(1, 1, WHITE);
  // Iris (3 wide × 3 tall)
  r(1, 2, 3, 2, eyeColor);
  // Pupil (1×2 center)
  r(2, 2, 1, 2, OUT);
  // Highlight (sparkle)
  p(1, 1, WHITE);
  p(3, 1, WHITE);
}

// Minimal pixel text — only the characters we need for "~* dollZ *~"
function drawPixelText(ctx, text, cx, cy, color, scale = 3) {
  // Each char is 5 cols × 7 rows of pixels. Colon-delimited column bitmasks.
  const GLYPHS = {
    'd': ['01110', '10001', '10001', '10001', '10001', '10001', '01111'],
    'o': ['01110', '10001', '10001', '10001', '10001', '10001', '01110'],
    'l': ['11100', '00100', '00100', '00100', '00100', '00100', '11111'],
    'Z': ['11111', '00001', '00010', '00100', '01000', '10000', '11111'],
    'z': ['11111', '00010', '00100', '01000', '10000', '11111', '00000'],
    '~': ['00000', '01001', '10110', '00000', '00000', '00000', '00000'],
    '*': ['00100', '10101', '01110', '11111', '01110', '10101', '00100'],
    ' ': ['00000', '00000', '00000', '00000', '00000', '00000', '00000'],
  };
  const chars = text.split('');
  const totalWidth = chars.reduce((s, c) => s + (GLYPHS[c] ? 6 : 6), 0) * scale;
  let x = cx - totalWidth / 2;
  const y = cy - (7 * scale) / 2;
  ctx.fillStyle = color;
  for (const ch of chars) {
    const g = GLYPHS[ch];
    if (g) {
      for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 5; c++) {
          if (g[r][c] === '1') {
            ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
          }
        }
      }
    }
    x += 6 * scale;
  }
}

// Render previews
const container = document.getElementById('patterns');
const canvases = [];
for (const p of PATTERNS) {
  const div = document.createElement('div');
  div.className = 'pattern';
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  p.fn(ctx, W, H);
  div.appendChild(canvas);
  const label = document.createElement('p');
  label.className = 'label';
  label.textContent = p.name;
  div.appendChild(label);
  container.appendChild(div);
  canvases.push({ name: p.name, canvas });
}

document.getElementById('dl').addEventListener('click', async () => {
  for (const { name, canvas } of canvases) {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${name}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await new Promise(r => setTimeout(r, 250));
  }
});
