<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Retro texture generator · 3D Maze</title>
<style>
  body { background: #1a1028; color: #fff; font-family: system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 18px; margin: 0 0 6px; letter-spacing: 0.5px; }
  p { color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.5; margin: 0 0 18px; max-width: 640px; }
  code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
  .patterns { display: flex; flex-wrap: wrap; gap: 16px; margin: 20px 0 24px; }
  .pattern { text-align: center; }
  .pattern canvas { display: block; width: 220px; height: 220px; image-rendering: pixelated; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; }
  .pattern .label { margin: 8px 0 0; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  button {
    background: #b89ad8; color: #1a1028; border: 0;
    padding: 10px 20px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; font-weight: 600;
  }
  button:hover { background: #c9afe4; }
</style>
</head>
<body>

<h1>Retro texture generator</h1>
<p>
  Four procedurally-generated patterns inspired by the Windows 3D Maze screensaver.
  Click <strong>Download all</strong> to save them as PNGs, then move them into
  <code>art/retro/</code>. Then tell Claude you have them — it'll wire them into the catalog.
</p>

<div class="patterns" id="patterns"></div>

<button id="dl">Download all</button>

<script>
const W = 512, H = 512;

const PATTERNS = [
  { name: 'Brick', fn: renderBrick },
  { name: 'Sky', fn: renderSky },
  { name: 'Checker', fn: renderChecker },
  { name: 'Stars', fn: renderStars },
  { name: 'Dollz', fn: renderDollz },
];

function renderBrick(ctx, w, h) {
  // mortar background — soft baby pink
  ctx.fillStyle = '#ffd4e0';
  ctx.fillRect(0, 0, w, h);
  const bh = 42, bw = 110, gap = 4;
  let rowIdx = 0;
  for (let y = -gap; y < h + bh; y += bh + gap, rowIdx++) {
    const offset = rowIdx % 2 === 0 ? 0 : -bw / 2;
    for (let x = offset; x < w; x += bw + gap) {
      // bubblegum to hot-pink variation
      const v = (Math.sin((x * 0.13 + y * 0.27 + rowIdx * 1.1)) * 0.5 + 0.5);
      const r = Math.floor(235 + v * 20);      // stays in pink range 235-255
      const g = Math.floor(95 + v * 75);       // 95-170 — rose→salmon
      const b = Math.floor(160 + v * 50);      // 160-210 — always pink-leaning
      ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
      ctx.fillRect(x, y, bw, bh);
      // top highlight — pearl shimmer
      ctx.fillStyle = 'rgba(255, 240, 250, 0.35)';
      ctx.fillRect(x, y, bw, 3);
      // bottom shadow — muted rose
      ctx.fillStyle = 'rgba(120, 40, 80, 0.2)';
      ctx.fillRect(x, y + bh - 3, bw, 3);
      // left edge shadow
      ctx.fillStyle = 'rgba(120, 40, 80, 0.12)';
      ctx.fillRect(x, y, 2, bh);
    }
  }
}

function renderSky(ctx, w, h) {
  // Y2K sunset: hot pink → peach → lavender
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#ff5fa8');
  grad.addColorStop(0.45, '#ffa5c4');
  grad.addColorStop(0.75, '#e0b8e0');
  grad.addColorStop(1, '#c4a5e0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // puffy cotton-candy clouds
  const clouds = [
    { x: 90, y: 120, r: 42 },
    { x: 270, y: 170, r: 62 },
    { x: 420, y: 90, r: 38 },
    { x: 160, y: 320, r: 48 },
    { x: 400, y: 380, r: 55 },
    { x: 80, y: 430, r: 34 },
  ];
  for (const c of clouds) {
    // lilac shadow underneath
    ctx.fillStyle = 'rgba(180, 120, 170, 0.15)';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.45, c.y + Math.abs(i) * 3 + 4, c.r * (1 - Math.abs(i) * 0.15), 0, Math.PI * 2);
      ctx.fill();
    }
    // pearlescent white-pink body
    ctx.fillStyle = 'rgba(255, 240, 248, 0.97)';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.45, c.y + Math.abs(i) * 3, c.r * (1 - Math.abs(i) * 0.15), 0, Math.PI * 2);
      ctx.fill();
    }
    // bright pink-white highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.arc(c.x + i * c.r * 0.4 - 4, c.y - c.r * 0.2, c.r * (1 - Math.abs(i) * 0.2) * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // scatter a few sparkle stars across the sky (Y2K detail)
  let seed = 7;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 0x100000000; };
  for (let i = 0; i < 12; i++) {
    const x = rand() * w, y = rand() * h * 0.6;
    ctx.fillStyle = `rgba(255, 255, 255, ${0.6 + rand() * 0.4})`;
    ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + rand() * 0.3})`;
    ctx.fillRect(x - 2, y + 0.5, 6, 1);
    ctx.fillRect(x + 0.5, y - 2, 1, 6);
  }
}

function renderChecker(ctx, w, h) {
  // Y2K hot pink + black checker — skater / Avril Lavigne energy
  const size = 64;
  for (let y = 0; y < h; y += size) {
    for (let x = 0; x < w; x += size) {
      const isLight = (Math.floor(x / size) + Math.floor(y / size)) % 2 === 0;
      ctx.fillStyle = isLight ? '#ff5fa8' : '#1a0820';
      ctx.fillRect(x, y, size, size);
    }
  }
  // very subtle grain + shimmer
  for (let i = 0; i < 2000; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
    ctx.fillRect(x, y, 1, 1);
  }
}

function renderStars(ctx, w, h) {
  // Y2K holographic galaxy — deep magenta → plum → near-black
  const grad = ctx.createRadialGradient(w * 0.6, h * 0.4, 0, w / 2, h / 2, Math.max(w, h) / 1.1);
  grad.addColorStop(0, '#6b1a5a');
  grad.addColorStop(0.5, '#2a0a35');
  grad.addColorStop(1, '#0a0214');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // deterministic pseudo-random stars
  let seed = 42;
  const rand = () => {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 0x100000000;
  };
  // pink/white/lavender star palette for Y2K holographic feel
  const starColors = [
    [255, 255, 255],  // white
    [255, 180, 220],  // baby pink
    [255, 100, 180],  // hot pink
    [210, 180, 255],  // lavender
  ];
  for (let i = 0; i < 280; i++) {
    const x = Math.floor(rand() * w);
    const y = Math.floor(rand() * h);
    const roll = rand();
    const size = roll < 0.78 ? 1 : roll < 0.94 ? 2 : 3;
    const alpha = 0.5 + rand() * 0.5;
    const color = starColors[Math.floor(rand() * starColors.length)];
    ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    ctx.fillRect(x, y, size, size);
    if (size === 3) {
      // sparkle cross-arms
      ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha * 0.55})`;
      ctx.fillRect(x - 3, y + 1, size + 6, 1);
      ctx.fillRect(x + 1, y - 3, 1, size + 6);
    }
  }
  // holographic nebula smudges — soft pink and lavender clouds
  const nebulaColors = [
    'rgba(255, 120, 200, ',
    'rgba(200, 150, 255, ',
  ];
  for (let i = 0; i < 4; i++) {
    const cx = Math.floor(rand() * w);
    const cy = Math.floor(rand() * h);
    const baseColor = nebulaColors[i % nebulaColors.length];
    for (let j = 0; j < 60; j++) {
      const r = rand() * 32;
      const a = rand() * Math.PI * 2;
      ctx.fillStyle = baseColor + ((1 - r / 32) * 0.3).toFixed(3) + ')';
      ctx.fillRect(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1, 1);
    }
  }
}

function renderDollz(ctx, w, h) {
  // Pink cotton-candy backdrop with subtle pattern
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#ffd4ea');
  grad.addColorStop(1, '#ffa8cc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Deterministic randomness
  let seed = 123;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 0x100000000; };

  // Scattered background hearts + sparkles
  for (let i = 0; i < 35; i++) {
    const x = rand() * w, y = rand() * h;
    const alpha = 0.25 + rand() * 0.3;
    if (rand() < 0.6) {
      // tiny heart
      ctx.fillStyle = `rgba(255, 100, 170, ${alpha})`;
      drawHeart(ctx, x, y, 3 + rand() * 3);
    } else {
      // sparkle
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fillRect(x, y, 2, 2);
      ctx.fillRect(x - 3, y + 1, 8, 1);
      ctx.fillRect(x + 1, y - 3, 1, 8);
    }
  }

  // Palettes
  const HAIR = ['#ffe066', '#8b4513', '#2a1a28', '#ff5fa8', '#9966cc', '#ff7755', '#ffffff', '#66ccff'];
  const SKIN = ['#ffe0c4', '#f5cfa8', '#d4a573', '#a8785a', '#6b4a30'];
  const DRESS = ['#ff4a9d', '#9966cc', '#66ccff', '#ff9944', '#88dd88', '#ffd93d', '#ff6b9d', '#c4a5e0'];
  const HAIR_STYLES = ['long', 'bob', 'pigtails', 'updo', 'curly'];
  const ACCESSORIES = [null, 'heart', 'bow', 'shades', null, null];

  // 4 columns × 3 rows of dolls
  const COLS = 4, ROWS = 3;
  const TILE_W = w / COLS;
  const TOP_PAD = 60;
  const TILE_H = (h - TOP_PAD - 20) / ROWS;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const tileX = col * TILE_W;
      const tileY = TOP_PAD + row * TILE_H;
      // center doll in tile
      const dollOX = tileX + (TILE_W - 60) / 2;
      const dollOY = tileY + (TILE_H - 80) / 2;

      const hair = HAIR[Math.floor(rand() * HAIR.length)];
      const skin = SKIN[Math.floor(rand() * SKIN.length)];
      const dress = DRESS[Math.floor(rand() * DRESS.length)];
      const style = HAIR_STYLES[Math.floor(rand() * HAIR_STYLES.length)];
      const acc = ACCESSORIES[Math.floor(rand() * ACCESSORIES.length)];
      drawDoll(ctx, dollOX, dollOY, hair, skin, dress, style, acc);

      // nearby floating heart
      if (rand() < 0.4) {
        ctx.fillStyle = 'rgba(255, 70, 140, 0.7)';
        drawHeart(ctx, tileX + 8 + rand() * 20, dollOY + 10 + rand() * 30, 4);
      }
    }
  }

  // Title bar at top: "~* dollZ *~" in pixel-y Y2K style
  // Solid pink bar
  ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.fillRect(0, 4, w, 46);
  ctx.strokeStyle = 'rgba(255, 70, 140, 0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 5, w - 2, 44);
  // pixel text
  drawPixelText(ctx, '~* dollZ *~', w / 2, 26, '#c43090', 4);
}

function drawHeart(ctx, x, y, size) {
  // tiny pixel heart using rectangles
  const s = Math.max(1, Math.round(size / 3));
  ctx.fillRect(x - s * 2, y - s, s * 2, s);
  ctx.fillRect(x,       y - s, s * 2, s);
  ctx.fillRect(x - s * 3, y, s * 6, s);
  ctx.fillRect(x - s * 2, y + s, s * 4, s);
  ctx.fillRect(x - s,     y + s * 2, s * 2, s);
}

function drawDoll(ctx, ox, oy, hairColor, skinColor, dressColor, style, accessory) {
  // Chunky 2x scale pixel art. Effective grid: 30 cols × 40 rows, each 2x2 real px.
  const PX = 2;
  const px = (col, row, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(ox + col * PX, oy + row * PX, PX, PX);
  };
  const rect = (col, row, cols, rows, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(ox + col * PX, oy + row * PX, cols * PX, rows * PX);
  };

  const EYE = '#1a1028';
  const MOUTH = '#c43060';
  const BLUSH = 'rgba(255, 130, 180, 0.6)';
  const LEGS_COLOR = skinColor;
  const SHOE = '#1a1028';

  // Hair BACK (behind head) — varies by style
  if (style === 'long') {
    // long flowing, framing shoulders
    rect(7, 2, 16, 26, hairColor);
  } else if (style === 'bob') {
    rect(8, 3, 14, 12, hairColor);
  } else if (style === 'pigtails') {
    rect(8, 3, 14, 11, hairColor);
    rect(5, 8, 4, 10, hairColor);   // left pigtail
    rect(21, 8, 4, 10, hairColor);  // right pigtail
    rect(4, 16, 4, 3, hairColor);   // tail tip
    rect(22, 16, 4, 3, hairColor);
  } else if (style === 'updo') {
    rect(10, 1, 10, 4, hairColor);  // bun
    rect(11, -1, 8, 3, hairColor);
    rect(9, 4, 12, 8, hairColor);
  } else if (style === 'curly') {
    rect(7, 2, 16, 13, hairColor);
    // curl bumps
    for (let i = 0; i < 6; i++) {
      rect(7 + i * 3, 14, 2, 3, hairColor);
    }
  }

  // Head (skin)
  rect(10, 5, 10, 10, skinColor);
  // Soften head corners to oval
  px(10, 5, 'rgba(0,0,0,0)');
  px(19, 5, 'rgba(0,0,0,0)');
  px(10, 14, 'rgba(0,0,0,0)');
  px(19, 14, 'rgba(0,0,0,0)');

  // Hair FRONT (fringe)
  if (style === 'long' || style === 'bob' || style === 'curly') {
    rect(10, 5, 10, 2, hairColor);
    px(10, 7, hairColor);
    px(19, 7, hairColor);
  } else if (style === 'pigtails') {
    rect(10, 5, 10, 2, hairColor);
  } else if (style === 'updo') {
    rect(10, 5, 10, 1, hairColor);
  }

  // Blush
  ctx.fillStyle = BLUSH;
  ctx.fillRect(ox + 11 * PX, oy + 11 * PX, 2 * PX, PX);
  ctx.fillRect(ox + 17 * PX, oy + 11 * PX, 2 * PX, PX);

  // Eyes (with white highlight)
  if (accessory === 'shades') {
    rect(11, 9, 8, 2, '#1a1028');
    px(12, 9, '#ff5fa8');
    px(16, 9, '#ff5fa8');
  } else {
    rect(12, 8, 2, 3, EYE);
    rect(16, 8, 2, 3, EYE);
    px(13, 8, '#fff');
    px(17, 8, '#fff');
  }

  // Mouth
  rect(13, 12, 4, 1, MOUTH);

  // Accessory: bow on hair
  if (accessory === 'bow') {
    rect(8, 3, 3, 2, '#ff4a9d');
    rect(19, 3, 3, 2, '#ff4a9d');
    rect(11, 3, 8, 2, '#ff4a9d');
    px(14, 3, '#fff');
  }

  // Neck
  rect(13, 15, 4, 2, skinColor);

  // Dress — A-line trapezoid, built row by row
  for (let r = 0; r < 14; r++) {
    const width = 8 + r; // grows from 8 to 21
    const startCol = 15 - Math.floor(width / 2);
    rect(startCol, 17 + r, width, 1, dressColor);
  }
  // Dress highlight (slight shimmer)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(ox + 14 * PX, oy + 19 * PX, PX, 8 * PX);

  // Arms
  rect(7, 18, 2, 11, skinColor);
  rect(21, 18, 2, 11, skinColor);

  // Legs
  rect(12, 31, 2, 6, LEGS_COLOR);
  rect(16, 31, 2, 6, LEGS_COLOR);

  // Shoes (little mary janes)
  rect(11, 37, 4, 2, SHOE);
  rect(15, 37, 4, 2, SHOE);

  // Floating heart accessory
  if (accessory === 'heart') {
    ctx.fillStyle = '#ff4a9d';
    drawHeart(ctx, ox + 30 * PX, oy + 8 * PX, 4);
  }
}

// Minimal pixel text — only the characters we need for "~* dollZ *~"
function drawPixelText(ctx, text, cx, cy, color, scale = 3) {
  // Each char is 5 cols × 7 rows of pixels. Colon-delimited column bitmasks.
  const GLYPHS = {
    'd': ['01110', '10001', '10001', '10001', '10001', '10001', '01111'],
    'o': ['01110', '10001', '10001', '10001', '10001', '10001', '01110'],
    'l': ['11100', '00100', '00100', '00100', '00100', '00100', '11111'],
    'Z': ['11111', '00001', '00010', '00100', '01000', '10000', '11111'],
    'z': ['11111', '00010', '00100', '01000', '10000', '11111', '00000'],
    '~': ['00000', '01001', '10110', '00000', '00000', '00000', '00000'],
    '*': ['00100', '10101', '01110', '11111', '01110', '10101', '00100'],
    ' ': ['00000', '00000', '00000', '00000', '00000', '00000', '00000'],
  };
  const chars = text.split('');
  const totalWidth = chars.reduce((s, c) => s + (GLYPHS[c] ? 6 : 6), 0) * scale;
  let x = cx - totalWidth / 2;
  const y = cy - (7 * scale) / 2;
  ctx.fillStyle = color;
  for (const ch of chars) {
    const g = GLYPHS[ch];
    if (g) {
      for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 5; c++) {
          if (g[r][c] === '1') {
            ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
          }
        }
      }
    }
    x += 6 * scale;
  }
}

// Render previews
const container = document.getElementById('patterns');
const canvases = [];
for (const p of PATTERNS) {
  const div = document.createElement('div');
  div.className = 'pattern';
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  p.fn(ctx, W, H);
  div.appendChild(canvas);
  const label = document.createElement('p');
  label.className = 'label';
  label.textContent = p.name;
  div.appendChild(label);
  container.appendChild(div);
  canvases.push({ name: p.name, canvas });
}

document.getElementById('dl').addEventListener('click', async () => {
  for (const { name, canvas } of canvases) {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${name}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await new Promise(r => setTimeout(r, 250));
  }
});
</script>

</body>
</html>
